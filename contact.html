<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – DWP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;700&family=Inconsolata:wght@300;400;600&family=Outfit:wght@300;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="contact-page">
    <header>
        <a href="index.html" class="logo">DWP</a>
        <div class="menu-toggle"><span></span><span></span><span></span></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="releases.html">Releases</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="contact-split">
            <div class="contact-left">
                <h1>Contact</h1>
                <form class="contact-form">
                    <textarea placeholder="Tell us everything..."></textarea>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" placeholder="Your Name">
                        </div>
                        <div class="form-group">
                            <input type="email" placeholder="Email Address">
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" onclick="return false;">Send Message</button>
                </form>
            </div>

            <div class="contact-right">
                <div class="info-category">
                    <span class="info-label">Media Manager</span>
                    <div class="info-content">
                        <p>Vlado Juščák</p>
                        <p>info@maileibel.com</p>
                    </div>
                </div>

                <div class="info-category">
                    <span class="info-label">Booking & Artist Contact</span>
                    <div class="info-content">
                        <p>Petr Ullmann</p>
                        <p>+420 731 151 045</p>
                    </div>
                </div>

                <div class="info-category">
                    <span class="info-label">Label & Marketing</span>
                    <div class="info-content">
                        <p>Mai Lei Bel</p>
                        <p>booking@maileibel.com</p>
                    </div>
                </div>

                <div class="info-category">
                    <span class="info-label">Location</span>
                    <div class="info-content">
                        <p>Naszvadigasse 1</p>
                        <p>Kittsee, 2421, Austria</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer style="background: transparent;">
        <div class="footer-left">
            <span>DWP &copy; 2026</span>
        </div>
        <div class="copy">Based on Angio Theme</div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
